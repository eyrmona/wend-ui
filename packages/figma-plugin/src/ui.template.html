<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        padding: 12px;
        font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 12px;
        color: #1e1e1e;
      }

      p {
        margin: 0 0 8px;
        line-height: 1.4;
      }

      textarea {
        width: 100%;
        height: 260px;
        box-sizing: border-box;
        font-family: 'SF Mono', Menlo, monospace;
        font-size: 11px;
        resize: vertical;
      }

      button {
        margin-top: 8px;
        width: 100%;
        padding: 8px;
        background: #18a0fb;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
      }

      button:hover {
        background: #0d8ee0;
      }

      #status {
        margin-top: 8px;
        min-height: 32px;
        line-height: 1.4;
      }

      #status.error {
        color: #f24822;
      }
    </style>
  </head>
  <body>
    <p>Paste the contents of <code>packages/tokens/build/figma/tokens.json</code> (run <code>npm run build -w packages/tokens</code> first), then import.</p>
    <textarea id="tokens-input" placeholder="[ { &quot;name&quot;: ..., &quot;type&quot;: ..., &quot;value&quot;: ... } ]"></textarea>
    <button id="import-button">Import into Figma Variables</button>
    <div id="status"></div>
    <script>
      __UI_SCRIPT__
    </script>
  </body>
</html>
